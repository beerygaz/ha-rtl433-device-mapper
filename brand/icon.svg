<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="58" fill="url(#bg)"/>
  
  <!-- Radio waves (3 arcs emanating from antenna tip) -->
  <path d="M 44 38 A 24 24 0 0 1 84 38" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <path d="M 36 30 A 34 34 0 0 1 92 30" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <path d="M 28 22 A 44 44 0 0 1 100 22" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
  
  <!-- Antenna mast -->
  <rect x="61" y="38" width="6" height="38" rx="3" fill="white"/>
  
  <!-- Antenna tip (circle) -->
  <circle cx="64" cy="36" r="5" fill="white"/>
  
  <!-- Base / ground plane -->
  <path d="M 42 82 L 64 76 L 86 82" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Arrow / mapper symbol (pointing right, suggesting mapping/routing) -->
  <path d="M 48 96 L 80 96" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M 74 90 L 80 96 L 74 102" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  
  <!-- Small dots representing discovered devices -->
  <circle cx="44" cy="96" r="3" fill="white" opacity="0.7"/>
  <circle cx="86" cy="96" r="3" fill="#4CAF50"/>
</svg>
