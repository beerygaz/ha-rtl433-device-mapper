<!DOCTYPE html>
<html>
<head>
<style>
body { background: #f5f5f5; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 40px; }
.card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
h1 { color: #1565C0; margin-bottom: 0; }
h3 { color: #666; margin-bottom: 16px; }
.row { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
.checker { background: repeating-conic-gradient(#ddd 0% 25%, white 0% 50%) 50% / 20px 20px; padding: 20px; border-radius: 8px; }
</style>
</head>
<body>
<h1>RTL-433 Device Mapper — Brand Preview</h1>
<div class="row">
  <div class="card"><h3>icon.svg</h3><div class="checker"><img src="icon.svg" width="128" height="128"></div></div>
  <div class="card"><h3>icon.png (128)</h3><div class="checker"><img src="icon.png" width="128" height="128"></div></div>
  <div class="card"><h3>icon@2x.png (256)</h3><div class="checker"><img src="icon@2x.png" width="256" height="256"></div></div>
</div>
<div class="row">
  <div class="card"><h3>logo.svg</h3><div class="checker"><img src="logo.svg" width="500" height="200"></div></div>
  <div class="card"><h3>logo.png</h3><div class="checker"><img src="logo.png" width="500" height="200"></div></div>
</div>
</body>
</html>
