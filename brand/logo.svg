<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="88"/>
    </clipPath>
  </defs>
  
  <!-- Icon on the left (larger circle) -->
  <circle cx="100" cy="100" r="88" fill="url(#bg)"/>
  
  <g clip-path="url(#circle-clip)">
    <!-- Radio waves -->
    <path d="M 68 64 A 38 38 0 0 1 132 64" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <path d="M 52 48 A 58 58 0 0 1 148 48" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
    <path d="M 36 32 A 78 78 0 0 1 164 32" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
    
    <!-- Antenna -->
    <rect x="96" y="64" width="8" height="48" rx="4" fill="white"/>
    <circle cx="100" cy="60" r="7" fill="white"/>
    
    <!-- Base -->
    <path d="M 66 126 L 100 118 L 134 126" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Arrow -->
    <path d="M 76 150 L 124 150" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M 116 142 L 124 150 L 116 158" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <circle cx="70" cy="150" r="5" fill="white" opacity="0.7"/>
    <circle cx="134" cy="150" r="5" fill="#4CAF50"/>
  </g>
  
  <!-- Text -->
  <text x="210" y="90" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="42" font-weight="700" fill="#1565C0">RTL-433</text>
  <text x="210" y="135" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="28" font-weight="400" fill="#666">Device Mapper</text>
</svg>
